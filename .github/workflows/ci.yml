name: CI Build APK

# ─────────────────────────────────────────────────────────────
# 持续集成工作流（对应发布流程第 1-2 步）
#   1. 修复 bug、实现新功能 → push 触发单元测试
#   2. 内部测试 → 构建 Debug APK 作为 artifact 供开发团队验证
#
# 行业规范：
#   - 最小权限（workflow 级别 contents: read）
#   - 构建产物用 artifact 上传，不提交回仓库（避免污染历史 + 循环触发）
#   - 可缓存（JDK + Gradle）
#   - 完整 Step Summary
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/*.md'
      - 'log/**'
  workflow_dispatch:

# 行业规范：workflow 级别最小权限
permissions:
  contents: read

# 并发控制：同分支新推送取消旧运行（节省额度）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 集中环境变量
env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true -Dorg.gradle.configuration-cache=false"
  GRADLE_VERSION: '9.4.1'

jobs:
  # 先测试：复用 test.yml（CI 不强制覆盖率）
  test:
    name: Run Unit Tests
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  # 后打包：构建 Debug APK 供内部测试（产物用 artifact 上传）
  build:
    name: Build Debug APK
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # bot 提交跳过构建，避免循环触发
    if: ${{ always() && (github.event_name != 'push' || github.event.head_commit.author.name != 'github-actions[bot]') && needs.test.result != 'failure' }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Build Debug APK
        run: |
          set -o pipefail
          gradle assembleDebug \
            --console=plain \
            --stacktrace \
            --no-daemon 2>&1 | tee build.log

      # 列出实际生成的 APK 路径（lsplugin.apksign 等插件可能重命名/移动 APK）
      - name: List generated APK files
        if: always()
        run: |
          echo "=== APK files in app/build/outputs ==="
          find app/build/outputs -name "*.apk" -type f -exec ls -la {} \; || true
          echo "=== Full outputs/apk tree ==="
          find app/build/outputs/apk -type f 2>/dev/null || echo "(no outputs/apk directory)"

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.run_id }}
          # 使用通配符：lsplugin.apksign 等插件可能把 APK 输出到非默认路径或改名
          path: app/build/outputs/apk/**/*.apk
          retention-days: 14
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}
          path: build.log
          retention-days: 7
          if-no-files-found: warn

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports-${{ github.run_id }}
          path: |
            app/build/reports
            app/build/outputs
          retention-days: 14
          if-no-files-found: warn

      - name: Publish CI status report
        if: always()
        run: |
          echo "## CI Build Status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | ${{ needs.test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ CI build succeeded, Debug APK generated as artifact." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ CI build failed, download build-reports artifact for details." >> "$GITHUB_STEP_SUMMARY"
          fi

  # 状态通知：汇总测试与构建结果（skipped 视为正常，避免 bot 提交误报）
  notify:
    name: Status Notification
    needs: [test, build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Workflow status notification
        run: |
          echo "## Workflow Status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unit Tests | ${{ needs.test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Debug Build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # skipped 视为正常（如 bot 提交时 build job 被跳过）
          TEST_OK=false
          BUILD_OK=false
          { [ "${{ needs.test.result }}" = "success" ] || [ "${{ needs.test.result }}" = "skipped" ]; } && TEST_OK=true
          { [ "${{ needs.build.result }}" = "success" ] || [ "${{ needs.build.result }}" = "skipped" ]; } && BUILD_OK=true

          if [ "$TEST_OK" = "true" ] && [ "$BUILD_OK" = "true" ]; then
            echo "✅ Overall: success" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Overall: failure" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
