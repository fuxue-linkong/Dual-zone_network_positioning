name: CI Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || github.event.head_commit.author.name != 'github-actions[bot]' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'
          cache-disabled: true

      - name: Verify JDK version
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

      - name: Set JAVA_HOME for Gradle
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Clean old CI logs
        run: |
          mkdir -p log/ci
          rm -f log/ci/*

      - name: Build Debug APK
        run: |
          gradle assembleDebug --no-daemon --stacktrace --info 2>&1 | tee log/ci/build.log

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports
            app/build/outputs

      - name: Commit and push CI log
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add log/ci/
          if git diff --cached --quiet; then
            echo "No log changes to commit"
          else
            git commit -m "ci: upload latest build log"
            git push
          fi
