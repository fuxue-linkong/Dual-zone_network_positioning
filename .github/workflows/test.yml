name: Unit Tests

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feature/**'
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/*.md'
      - 'log/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || github.event.head_commit.author.name != 'github-actions[bot]' }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
          cache-disabled: true

      - name: Verify JDK version
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

      - name: Set JAVA_HOME for Gradle
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Run unit tests
        run: |
          set -o pipefail
          gradle :app:testDebugUnitTest --console=plain --stacktrace 2>&1 | tee test-output.log

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests
            app/build/test-results
            test-output.log

      - name: Publish test summary
        if: always()
        run: |
          echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f app/build/test-results/testDebugUnitTest/TEST-*.xml ]; then
            echo "| Module | Tests | Failures | Skipped |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|----------|---------|" >> $GITHUB_STEP_SUMMARY
            for f in app/build/test-results/testDebugUnitTest/TEST-*.xml; do
              module=$(basename "$f" | sed 's/^TEST-//' | sed 's/\.xml$//')
              tests=$(grep -oP 'tests="\K[^"]+' "$f" | head -1)
              failures=$(grep -oP 'failures="\K[^"]+' "$f" | head -1)
              skipped=$(grep -oP 'skipped="\K[^"]+' "$f" | head -1)
              echo "| $module | $tests | $failures | $skipped |" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "测试结果文件未生成，请查看上方构建日志。" >> $GITHUB_STEP_SUMMARY
          fi
