name: Unit Tests

# ─────────────────────────────────────────────────────────────
# 可复用单元测试工作流（被 ci.yml / release.yml 调用）
# 对应发布流程：所有阶段的基础质量门禁
# 行业规范：最小权限、可缓存、可复用、完整摘要
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feature/**'
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/*.md'
      - 'log/**'
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      fail-on-coverage:
        description: '是否强制覆盖率检查（发布流程启用，CI 不启用）'
        required: false
        type: boolean
        default: false
  workflow_dispatch:

# 行业规范：workflow 级别最小权限，job 级别按需提升
permissions:
  contents: read

# 并发控制：独立分组 + 区分事件来源，避免不同调用链路互相阻塞
# - group: workflow 名 + 固定后缀 '-unit-tests' + ref + event_name
#   * 加入 event_name：ci(push/pr) 与 release(workflow_call) 同 ref 时不争用同一组
#   * tag 场景：使用 ref_name（tag 名）而非完整 ref，确保不同 tag 互不阻塞
# - cancel-in-progress: 仅 push 取消旧运行；workflow_call 保留 false 避免中断发布
#
# !!! GHA 表达式注意 !!!
# GitHub Actions 表达式语法不支持三元运算符 `cond ? a : b`，会报：
#   Unexpected symbol: '?'. Located at position N within expression
# 等价写法使用 `&&` / `||` 短路求值：`cond && a || b`
# （cond 为真时返回 a；a 为真则 || 直接返回 a；cond 为假或 a 为假时返回 b）
#
# !!! YAML 注意：group 的值用双引号包裹 !!!
# 表达式中的 `github.ref_name && github.ref_name || github.ref` 含 `: ` 和特殊字符，
# 用双引号包裹避免 YAML scanner 误解析为映射键值分隔符。
concurrency:
  group: "${{ format('{0}-unit-tests-{1}-{2}', github.workflow, startsWith(github.ref, 'refs/tags/') && github.ref_name || github.ref, github.event_name) }}"
  cancel-in-progress: ${{ github.event_name == 'push' }}

# 集中环境变量
env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true -Dorg.gradle.configuration-cache=false"
  GRADLE_VERSION: '9.4.1'

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # bot 提交跳过，避免循环触发
    if: ${{ github.event_name != 'push' || github.event.head_commit.author.name != 'github-actions[bot]' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle          # 启用 Gradle 依赖缓存

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false # 可写缓存（行业惯例：分支构建可写）

      - name: Run unit tests
        run: |
          set -o pipefail
          gradle :app:testDebugUnitTest \
            --console=plain \
            --stacktrace \
            --no-daemon 2>&1 | tee test-output.log

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-${{ github.run_id }}
          path: |
            app/build/reports/tests
            app/build/test-results
            test-output.log
          retention-days: 30
          if-no-files-found: warn

      - name: Publish test summary
        if: always()
        run: |
          echo "## Unit Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # 行业规范：使用 compgen -G 进行 glob 模式文件存在性检查
          if compgen -G "app/build/test-results/testDebugUnitTest/TEST-*.xml" > /dev/null; then
            echo "| Module | Tests | Failures | Skipped |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|----------|---------|" >> "$GITHUB_STEP_SUMMARY"
            for f in app/build/test-results/testDebugUnitTest/TEST-*.xml; do
              module=$(basename "$f" | sed 's/^TEST-//' | sed 's/\.xml$//')
              tests=$(grep -oP 'tests="\K[^"]+' "$f" | head -1)
              failures=$(grep -oP 'failures="\K[^"]+' "$f" | head -1)
              skipped=$(grep -oP 'skipped="\K[^"]+' "$f" | head -1)
              echo "| $module | $tests | $failures | $skipped |" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "⚠️ Test result files not generated, check build logs above." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Coverage enforcement | ${{ inputs.fail-on-coverage }} |" >> "$GITHUB_STEP_SUMMARY"
